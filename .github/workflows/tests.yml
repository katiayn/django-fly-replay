name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {python-version: "3.10", django-version: "5.2"}
          - {python-version: "3.11", django-version: "5.2"}
          - {python-version: "3.12", django-version: "5.2"}
          - {python-version: "3.13", django-version: "5.2"}
          - {python-version: "3.14", django-version: "5.2"}
          - {python-version: "3.12", django-version: "6.0"}
          - {python-version: "3.13", django-version: "6.0"}
          - {python-version: "3.14", django-version: "6.0", coverage: true}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install .[dev] django~=${{ matrix.django-version }}.0
      - run: pytest --cov=django_fly_replay --cov-report=xml
        if: matrix.coverage
      - run: pytest
        if: "!matrix.coverage"
      - uses: codecov/codecov-action@v5
        if: matrix.coverage
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
